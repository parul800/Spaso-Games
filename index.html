<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPASO Game Studio</title>

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/boot.css">

    <script src="assets/js/main.js" defer></script>
    <script src="assets/js/matrix.js" defer></script>
    <script src="assets/js/boot.js" defer></script>
    <script src="assets/js/ui.js" defer></script>
</head>
<body>

    <!-- MATRIX BACKGROUND -->
    <canvas id="matrix"></canvas>

    <!-- NAVIGATION BAR -->
    <nav class="navbar">
        <div class="logo">
            <img src="assets/logo.png" class="logo-img" alt="SPASO Logo">
            <span class="logo-text">SPASO</span>
        </div>

        <div class="menu-btn" onclick="toggleMenu()">☰</div>

        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="games.html">Games</a></li>
            <li><a href="trailers.html">Trailers</a></li>
            <li><a href="downloads.html">Downloads</a></li>
            <li><a href="eva.html">EVA</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="admin.html">Admin</a></li>
        </ul>
    </nav>

    <!-- HERO -->
    <section class="hero">
        <div class="hero-inner">
            <h1 class="glitch mega" data-text="SPASO GAME STUDIO">
                SPASO GAME STUDIO
            </h1>

            <p class="tagline">
                Cyberpunk • Hacking • Neon Gaming Universe
            </p>

            <div class="cta-group">
                <a class="btn btn-holo" href="games.html">Play Games</a>
                <a class="btn btn-outline" href="about.html">About Us</a>
                <a class="btn btn-holo" href="eva.html">Launch EVA</a>
            </div>
        </div>

        <div class="holo-line"></div>
    </section>

    <!-- TRENDING GAMES -->
    <section class="page-wrap">
        <div class="holo-card reveal">
            <h2>Trending Games</h2>
            <p>Your best neon cyberpunk mini-games.</p>
        </div>
    </section>

    <!-- AAA BOOT SEQUENCE -->
    <div id="boot" class="boot-screen">
        <div class="terminal">
            <pre id="terminalText"></pre>
            <div class="loader-bar">
                <span id="loaderFill"></span>
            </div>
            <div id="finalStatus"></div>
        </div>
    </div>

    <!-- CURSOR -->
    <div id="cursor"></div>

    <script>
        function toggleMenu() {
            document.getElementById("navLinks").classList.toggle("show");
        }
    </script>

</body>
</html>
