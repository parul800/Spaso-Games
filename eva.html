<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVA AI Lab | SPASO</title>

    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        .eva-lab {
            min-height: 100vh;
            padding: 120px 30px 60px;
            max-width: 1200px;
            margin: auto;
        }

        .eva-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .eva-header h1 {
            font-size: 64px;
            color: #00ff66;
            text-shadow: 0 0 20px #00ff66;
        }

        .eva-header p {
            color: #00ffcc;
            font-size: 20px;
        }

        .eva-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
        }

        .eva-terminal,
        .eva-tools {
            border: 1px solid #00ff66;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.55);
            padding: 25px;
        }

        .eva-screen {
            min-height: 300px;
            border: 1px solid #00ff66;
            border-radius: 10px;
            padding: 20px;
            color: #00ffcc;
            font-family: monospace;
            margin-bottom: 20px;
            white-space: pre-line;
        }

        .eva-input {
            display: flex;
            gap: 10px;
        }

        .eva-input input {
            flex: 1;
            padding: 14px;
            background: #000;
            border: 1px solid #00ff66;
            color: #00ffcc;
            border-radius: 8px;
        }

        .eva-input button,
        .tool-btn {
            padding: 14px 18px;
            border: 1px solid #00ff66;
            background: #00ff66;
            color: #000;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }

        .eva-tools h3 {
            margin-bottom: 20px;
            color: #00ff66;
        }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<nav class="navbar">
    <div class="logo">
        <img src="assets/logo.png" class="logo-img" alt="SPASO Logo">
        <span class="logo-text">SPASO</span>
    </div>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="games.html">Games</a></li>
        <li><a href="eva.html">EVA</a></li>
        <li><a href="admin.html">Admin</a></li>
    </ul>
</nav>

<section class="eva-lab">
    <div class="eva-header">
        <h1>EVA AI LAB</h1>
        <p>The intelligence core of SPASO Game Studio</p>
    </div>

    <div class="eva-grid">
        <div class="eva-terminal">
            <div class="eva-screen" id="evaScreen">
EVA ONLINE...
Ready for game ideas, coding help, cyberpunk lore and launch intelligence.
            </div>

            <div class="eva-input">
                <input type="text" id="evaInput" placeholder="Ask EVA anything...">
                <button onclick="runEVA()">Send</button>
            </div>
        </div>

        <div class="eva-tools">
            <h3>EVA Quick Tools</h3>
            <button class="tool-btn" onclick="quickPrompt('Generate a cyberpunk boss fight')">
                Boss Fight Idea
            </button>
            <button class="tool-btn" onclick="quickPrompt('Create horror mission story')">
                Story Generator
            </button>
            <button class="tool-btn" onclick="quickPrompt('Help debug HTML and CSS')">
                Coding Assist
            </button>
            <button class="tool-btn" onclick="quickPrompt('Suggest neon level design')">
                Level Design
            </button>
        </div>
    </div>
</section>

<script src="assets/js/matrix.js"></script>

<script>
async function runEVA() {
    const input = document.getElementById("evaInput").value;
    const screen = document.getElementById("evaScreen");

    if (!input.trim()) return;

    screen.innerText = "EVA: Thinking...";

    const res = await fetch("http://127.0.0.1:5000/ask-eva", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            prompt: input
        })
    });

    const data = await res.json();

    screen.innerText =
        "USER: " + input + "\n\n" +
        "EVA: " + data.reply;
}

function quickPrompt(text) {
    document.getElementById("evaInput").value = text;
    runEVA();
}
</script>
</body>
</html>
